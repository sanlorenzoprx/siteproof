name = "siteproof-api"
main = "workers/siteproof-api/src/index.ts"
compatibility_date = "2026-05-14"

[vars]
AI_TEXT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
AI_TRANSCRIBE_MODEL = "@cf/openai/whisper"
ALLOWED_ORIGINS = ""   # comma-separated: https://siteproof.app,https://app.siteproof.app

[ai]
binding = "AI"

[[d1_databases]]
binding = "SITEPROOF_DB"
database_name = "siteproof_proof_package_db"
database_id = "9fc14697-4c1f-47e9-8a11-9fb66c07e06e"
migrations_dir = "workers/siteproof-api/migrations"

[[r2_buckets]]
binding = "SITEPROOF_MEDIA"
bucket_name = "siteproof-media"

[[r2_buckets]]
binding = "SITEPROOF_EXPORTS"
bucket_name = "siteproof-exports"
